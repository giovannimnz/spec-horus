version: "4.0.0"
reduction: "67 → 4-16 (conforme runtime)"
detail: "Hermes/Claude: 4 skills com $ARGUMENTS[0]. Codex/Gemini/Copilot: 16 comandos planos."
roles: 3

dev:
  prefix: hsd-dev
  description: "Developer — discover, define, plan, build, debug, maintain, ui"
  subcommands:
    - cmd: discover
      maps: [explore, spike, sketch, capture, ns-ideate, map-codebase, ns-context]
    - cmd: define
      maps: [discuss-phase, spec-phase, mvp-phase]
    - cmd: plan
      maps: [plan-phase, ultraplan-phase, ai-integration-phase]
    - cmd: build
      maps: [execute-phase, autonomous, quick, fast]
    - cmd: debug
      maps: [debug, forensics]
    - cmd: maintain
      maps: [docs-update, extract-learnings, ingest-docs, import, cleanup]
    - cmd: ui
      maps: [ui-phase, ui-review]

pm:
  prefix: hsd-pm
  description: "Project Manager — new, track, ship, config, manage"
  subcommands:
    - cmd: new
      maps: [new-project, new-milestone]
    - cmd: track
      maps: [progress, workstreams, thread, phase, workspace, graphify, stats]
    - cmd: ship
      maps: [ship, pr-branch, complete-milestone, milestone-summary, undo, update]
    - cmd: config
      maps: [config, settings, profile-user]
    - cmd: manage
      maps: [manager, surface, pause-work, resume-work, help, inbox]

qa:
  prefix: hsd-qa
  description: "QA — validate, audit, review"
  subcommands:
    - cmd: validate
      maps: [validate-phase, verify-work, health, add-tests]
    - cmd: audit
      maps: [audit-fix, audit-milestone, audit-uat]
    - cmd: review
      maps: [code-review, eval-review, review, review-backlog, plan-review-convergence, secure-phase]

config:
  prefix: hsd-config
  description: "System configuration — language, models"
